name: Deploy to pages
on:
  push:
    branches:
      - master

jobs:
  deploy_pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: 'x64'
          distribution: 'full'
          variant: 'CS'
          version: stable

      - name: Install Racket deps
        run: raco pkg install scribble-lp2-manual

      - name: Setup ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build
        run: make _site BUILD_OPTS=--trace

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
